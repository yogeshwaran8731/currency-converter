<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NexGen Currency Converter</title>
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            --card-bg: rgba(255, 255, 255, 0.07);
            --accent-color: #00f2fe;
            --text-color: #ffffff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, sans-serif;
        }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg-gradient);
            color: var(--text-color);
            overflow: hidden;
        }

        /* Ambient Background Glows */
        .glow {
            position: absolute;
            width: 300px;
            height: 300px;
            background: var(--accent-color);
            filter: blur(150px);
            opacity: 0.2;
            z-index: -1;
            animation: move 10s infinite alternate;
        }

        @keyframes move {
            from { transform: translate(-50%, -50%); }
            to { transform: translate(50%, 50%); }
        }

        .converter-card {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 40px;
            border-radius: 32px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        h1 {
            font-weight: 300;
            letter-spacing: -1px;
            margin-bottom: 30px;
            background: linear-gradient(to right, #fff, #a5a5a5);
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .input-group {
            margin-bottom: 20px;
            text-align: left;
        }

        label {
            display: block;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
            opacity: 0.6;
        }

        input, select {
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 15px;
            border-radius: 12px;
            color: white;
            font-size: 1.1rem;
            outline: none;
            transition: 0.3s;
        }

        input:focus, select:focus {
            border-color: var(--accent-color);
            background: rgba(255, 255, 255, 0.1);
        }

        .currency-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .result-container {
            margin-top: 30px;
            padding: 20px;
            background: rgba(0, 242, 254, 0.1);
            border-radius: 16px;
            border: 1px dashed rgba(0, 242, 254, 0.3);
        }

        #result-text {
            font-size: 1.5rem;
            font-weight: 600;
            color: var(--accent-color);
        }

        .last-updated {
            font-size: 0.7rem;
            opacity: 0.4;
            margin-top: 15px;
        }

        /* Custom Scrollbar for Select */
        select option {
            background: #24243e;
        }
    </style>
</head>
<body>
    <div class="glow"></div>
    
    <div class="converter-card">
        <h1>NexGen FX</h1>
        
        <div class="input-group">
            <label>Amount</label>
            <input type="number" id="amount" value="1.00" step="0.01">
        </div>

        <div class="currency-row">
            <div class="input-group">
                <label>From</label>
                <select id="fromCurrency"></select>
            </div>
            <div class="input-group">
                <label>To</label>
                <select id="toCurrency"></select>
            </div>
        </div>

        <div class="result-container">
            <div id="result-text">0.00</div>
            <div class="last-updated" id="lastUpdated">Fetching latest rates...</div>
        </div>
    </div>

    <script>
        const amountEl = document.getElementById('amount');
        const fromEl = document.getElementById('fromCurrency');
        const toEl = document.getElementById('toCurrency');
        const resultEl = document.getElementById('result-text');
        const updateEl = document.getElementById('lastUpdated');

        // Initialize App
        async function init() {
            try {
                const res = await fetch('https://api.frankfurter.app/currencies');
                const data = await res.json();
                
                // Populate Dropdowns
                Object.keys(data).forEach(code => {
                    const option1 = new Option(code, code);
                    const option2 = new Option(code, code);
                    fromEl.add(option1);
                    toEl.add(option2);
                });

                // Default values
                fromEl.value = 'USD';
                toEl.value = 'EUR';
                
                convert();
            } catch (err) {
                resultEl.innerText = "Error loading currencies";
            }
        }

        // Conversion Logic
        async function convert() {
            const amount = amountEl.value;
            const from = fromEl.value;
            const to = toEl.value;

            if (from === to) {
                resultEl.innerText = `${amount} ${to}`;
                return;
            }

            try {
                const res = await fetch(`https://api.frankfurter.app/latest?amount=${amount}&from=${from}&to=${to}`);
                const data = await res.json();
                
                const convertedValue = data.rates[to];
                resultEl.innerText = `${convertedValue.toFixed(2)} ${to}`;
                updateEl.innerText = `Last updated: ${data.date}`;
            } catch (err) {
                resultEl.innerText = "API Error";
            }
        }

        // Event Listeners
        [amountEl, fromEl, toEl].forEach(el => {
            el.addEventListener('input', convert);
        });

        init();
    </script>
</body>
</html>
